spring.application.name=phase6-security
server.port=8086

# Day 110: BCrypt strength — cost factor 12 is minimum for production (>=10ms on modern hardware)
spring.security.user.name=admin
spring.security.user.password={bcrypt}$2a$12$placeholder

# Day 114: RSA key pair paths for JWT signing
# Generate with: openssl genrsa -out rsa-private.pem 2048 && openssl rsa -in rsa-private.pem -pubout -out rsa-public.pem
# rsa.private-key=classpath:rsa-private.pem
# rsa.public-key=classpath:rsa-public.pem

# Day 115: Token expiry
app.security.access-token-expiry=900       # 15 minutes in seconds
app.security.refresh-token-expiry=604800   # 7 days in seconds

# Day 119: Redis for token blacklist
spring.data.redis.host=localhost
spring.data.redis.port=6379

# H2 for Authorization Server client registry (Days 127+)
spring.datasource.url=jdbc:h2:mem:phase6db;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

management.endpoints.web.exposure.include=health,info

logging.level.com.techleadguru=DEBUG
logging.level.org.springframework.security=DEBUG
