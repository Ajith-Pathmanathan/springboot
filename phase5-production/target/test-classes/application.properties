# ──────────────────────────────────────────────────────────────────────────────
# Phase 5 test configuration
# ──────────────────────────────────────────────────────────────────────────────

# Disable Spring Security / actuator security in tests
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration,\
  org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration

# H2 in-memory
spring.datasource.url=jdbc:h2:mem:phase5testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Redis auto-config in tests (use mock in test classes that need it)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration,\
  org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Small pool for exhaustion demos
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.leak-detection-threshold=2000

# Caffeine cache
spring.cache.type=caffeine

# OpenSessionInView off
spring.jpa.open-in-view=false

# Async pool
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=20

# Silence noisy logs
logging.level.org.springframework=WARN
logging.level.com.techleadguru=DEBUG
logging.level.com.zaxxer=WARN
