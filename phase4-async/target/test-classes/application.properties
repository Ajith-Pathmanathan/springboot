# ──────────────────────────────────────────────────────────────────────────────
# Phase 4 test configuration
# ──────────────────────────────────────────────────────────────────────────────

# Disable Spring Security auto-config (keeps tests simple; Day 61 uses SecurityContextHolder directly)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration,\
  org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration

# H2 in-memory (overrides main app.properties Postgres MODE)
spring.datasource.url=jdbc:h2:mem:phase4testdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Run schema.sql at startup (creates shedlock table for Day 67)
spring.sql.init.mode=always

# Quartz in-memory (no schema needed) — Day 68 overrides auto-startup per test class
spring.quartz.job-store-type=memory
spring.quartz.auto-startup=false

# Async pool — small but functional
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=50
spring.task.execution.thread-name-prefix=test-async-

# Scheduling pool
spring.task.scheduling.pool.size=2

# Silence noisy logs during tests
logging.level.org.springframework.scheduling=WARN
logging.level.org.quartz=WARN
logging.level.net.javacrumbs.shedlock=WARN
logging.level.com.techleadguru=DEBUG
