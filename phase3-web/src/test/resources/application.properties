# ──────────────────────────────────────────────────────────────────────────────
# Phase 3 test configuration
# ──────────────────────────────────────────────────────────────────────────────

# Disable Redis — not available in tests; Day 54 uses in-memory Bucket4j
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

# Day 47: execution-tracking filter — disabled by default (enabled in Day47 test only)
phase3.day47.tracking.enabled=false

# Day 53: idempotency filter — disabled by default (enabled in Day53 test only)
phase3.day53.idempotency.enabled=false

# Day 54: rate limiting — disabled by default (enabled in Day54 test only)
phase3.day54.rate-limit.enabled=false
phase3.day54.rate-limit.capacity=10
phase3.day54.rate-limit.refill-per-minute=60

# Day 55: CORS config — enabled globally (harmless for non-CORS requests)
phase3.day55.cors.enabled=true
phase3.day55.cors.allowed-origin=http://localhost:3000
