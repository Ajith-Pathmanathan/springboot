spring.application.name=phase3-web
server.port=8083

logging.level.com.techleadguru=DEBUG
logging.level.org.springframework.web.servlet=DEBUG

# Day 48: MDC correlation ID — structured logging
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] [requestId=%X{requestId}] [userId=%X{userId}] %-5level %logger{36} - %msg%n

# Actuator
management.endpoints.web.exposure.include=health,info,startup,metrics
management.endpoint.health.show-details=always
