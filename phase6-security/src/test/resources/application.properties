# ──────────────────────────────────────────────────────────────────────────────
# Phase 6 test configuration
# ──────────────────────────────────────────────────────────────────────────────

# Disable Security + Redis auto-configuration in tests
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration

# H2 for demos requiring JPA (Spring Authorization Server)
spring.datasource.url=jdbc:h2:mem:phase6testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Silence noisy logs
logging.level.org.springframework=WARN
logging.level.com.techleadguru=DEBUG
logging.level.org.springframework.security=WARN
