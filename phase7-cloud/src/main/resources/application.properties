spring.application.name=phase7-cloud
server.port=8087

# Eureka client (Days 134-136)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Config client (Day 141)
# spring.config.import=configserver:http://localhost:8888

# Kafka (Days 148-154)
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=phase7-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Resilience4j (Days 144-147)
resilience4j.circuitbreaker.instances.downstreamService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.downstreamService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.downstreamService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.downstreamService.sliding-window-size=10

resilience4j.retry.instances.downstreamService.max-attempts=3
resilience4j.retry.instances.downstreamService.wait-duration=500ms
resilience4j.retry.instances.downstreamService.enable-exponential-backoff=true
resilience4j.retry.instances.downstreamService.exponential-backoff-multiplier=2

# Distributed tracing (Days 155-156)
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# Prometheus (Days 157-158)
management.endpoints.web.exposure.include=*
management.metrics.export.prometheus.enabled=true

logging.level.com.techleadguru=DEBUG
