spring.application.name=phase5-production
server.port=8085

# Production-realistic JVM settings (also set in pom.xml maven plugin for mvn spring-boot:run)
# -Xms256m -Xmx512m -XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError

# Actuator — expose all for production diagnosis demos
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.heapdump.enabled=true
management.endpoint.threaddump.enabled=true

# H2 for quick demos
spring.datasource.url=jdbc:h2:mem:phase5db;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# HikariCP — small pool to make exhaustion demos work faster (Day 85)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.leak-detection-threshold=2000

# Day 88: DISABLE OpenSessionInView (it's problematic — Day 88 explains why)
spring.jpa.open-in-view=false

# Day 84: Caffeine cache config
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=300s

# Graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

logging.level.com.techleadguru=DEBUG
logging.level.com.zaxxer.hikari=DEBUG
