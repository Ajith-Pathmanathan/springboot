spring.application.name=phase2-data

# Use H2 for fast local demos (switch to PostgreSQL for production-realistic Day 36-42)
spring.datasource.url=jdbc:h2:mem:phase2db;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false

# Hibernate statistics — required for N+1 diagnosis (Days 31-34) and slow query detection (Day 41)
spring.jpa.properties.hibernate.generate_statistics=true
logging.level.org.hibernate.stat=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Day 34: global batch fetch size — reduces N+1 from N queries to ceil(N/50) batch IN queries
spring.jpa.properties.hibernate.default_batch_fetch_size=50

# HikariCP — tuned for demos (Day 36-38)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
# Day 38: detect connection leaks (any connection open > 2s triggers a warning)
spring.datasource.hikari.leak-detection-threshold=2000

# Flyway — Day 40
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-on-validation-error=true
spring.flyway.clean-disabled=false

logging.level.com.techleadguru=DEBUG
