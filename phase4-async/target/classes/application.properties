spring.application.name=phase4-async
server.port=8084

# Day 63: Virtual threads (Java 21+)
# Uncomment to enable virtual threads for all async tasks
# spring.threads.virtual.enabled=true

logging.level.com.techleadguru=DEBUG

# H2 for ShedLock and Quartz
spring.datasource.url=jdbc:h2:mem:phase4db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Quartz — Day 68: DB-backed job store
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=always
spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.StdJDBCDelegate

# Graceful shutdown — Day 90
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
